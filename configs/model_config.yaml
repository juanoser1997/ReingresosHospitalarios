# Configuracion del modelo de prediccion de reingreso hospitalario
# Estos valores son el punto de partida; Optuna los optimizara durante el entrenamiento.

xgboost_default:
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 3
  reg_alpha: 0.1
  reg_lambda: 1.0
  # scale_pos_weight: ratio de negativos/positivos (~8.0 para este dataset)
  scale_pos_weight: 8.0

# Espacio de busqueda de Optuna
optuna_search_space:
  n_estimators: [100, 600]
  max_depth: [3, 8]
  learning_rate: [0.01, 0.2]
  subsample: [0.6, 1.0]
  colsample_bytree: [0.6, 1.0]
  min_child_weight: [1, 10]
  reg_alpha: [0.001, 10.0]
  reg_lambda: [0.001, 10.0]
  scale_pos_weight: [5.0, 15.0]

# Configuracion del entrenamiento
training:
  n_trials: 20
  test_size: 0.2
  random_state: 42
  early_stopping_rounds: 30

# Umbral de decision para la clase positiva
# Se usa 0.3 en lugar de 0.5 para priorizar recall en contexto clinico
inference:
  decision_threshold: 0.3

# Metricas minimas para promover un modelo a Production
promotion:
  min_roc_auc: 0.68
  min_recall: 0.55
  max_allowed_drift_share: 0.30
